# Client-facing compose file: pulls a prebuilt image, no Nexus access or
# build step needed. This is what `docker compose up` and the devcontainer
# use by default.
#
#   docker compose up          # plain Docker
#   Cursor/VS Code: "Reopen in Container" uses this via .devcontainer/
#
# To build/publish the image itself (maintainers only, needs Nexus access),
# see docker-compose.build.yml and scripts/build-and-push-image.sh.
#
# Only ./src and ./public are bind-mounted -- those are what you actually
# edit (widget code, widgets.local.json). Everything else (package.json,
# vue.config.js, package-lock.json, node_modules, ...) stays exactly as
# baked into the image. Deliberately NOT bind-mounting the whole project
# root: package-lock.json in particular is gitignored, so a client package
# built via `git archive` doesn't have it on the host -- mounting `.:/app`
# would shadow the image's copy with a missing file and break the build
# (vue.config.webpack.js requires it directly). Mounting only the
# directories that need live-editing avoids that whole class of bug.
services:
  widgets-dev:
    image: ${WIDGETS_IMAGE:-ghcr.io/app-insight/insight-widgets:latest}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - node_modules_data:/app/node_modules
    ports:
      - "3001:3001"
    environment:
      - DEV_SERVER_PORT=3001

volumes:
  node_modules_data:

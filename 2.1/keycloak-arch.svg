<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8fafc" rx="12"/>

  <!-- ═══════════ USER ═══════════ -->
  <g transform="translate(30, 250)">
    <circle cx="40" cy="28" r="18" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="40" y="33" text-anchor="middle" font-size="18">👤</text>
    <rect x="8" y="50" width="64" height="22" rx="4" fill="#6366f1"/>
    <text x="40" y="65" text-anchor="middle" fill="white" font-size="11" font-weight="600">Пользователь</text>
  </g>

  <!-- ═══════════ INSIGHT SPA ═══════════ -->
  <rect x="140" y="40" width="460" height="540" rx="14" fill="white" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
  <rect x="140" y="40" width="460" height="36" rx="14" fill="#1e293b"/>
  <rect x="140" y="62" width="460" height="14" rx="0" fill="#1e293b"/>
  <text x="370" y="63" text-anchor="middle" fill="white" font-size="12" font-weight="700" letter-spacing="1">ИНСАЙТ (SPA)</text>

  <!-- ElemAuthContainer -->
  <rect x="165" y="96" width="200" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="265" y="118" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700">ElemAuthContainer</text>
  <text x="265" y="134" text-anchor="middle" fill="#3b82f6" font-size="10">основная сессия (токен 1)</text>
  <text x="265" y="148" text-anchor="middle" fill="#64748b" font-size="9">Client 1 · домен / логпас</text>

  <!-- Page -->
  <rect x="165" y="186" width="410" height="372" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="175" y="204" fill="#64748b" font-size="10" font-weight="600">Страница расчётного листка</text>

  <!-- ElemSecondFactorContainer -->
  <rect x="185" y="215" width="370" height="324" rx="8" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="185" y="215" width="370" height="28" rx="8" fill="#fef3c7"/>
  <rect x="185" y="232" width="370" height="11" rx="0" fill="#fef3c7"/>
  <text x="370" y="233" text-anchor="middle" fill="#92400e" font-size="11" font-weight="700">ElemSecondFactorContainer</text>

  <!-- sessionStorage badge -->
  <rect x="430" y="248" width="110" height="22" rx="5" fill="#fef9c3" stroke="#fbbf24" stroke-width="1"/>
  <text x="485" y="263" text-anchor="middle" fill="#78350f" font-size="9">💾 sessionStorage</text>

  <!-- State A: no token -->
  <rect x="205" y="252" width="210" height="64" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="310" y="270" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="600">Токен 2 отсутствует</text>
  <rect x="220" y="278" width="180" height="26" rx="5" fill="#f97316"/>
  <text x="310" y="295" text-anchor="middle" fill="white" font-size="11" font-weight="700">Подтвердить личность</text>

  <!-- State B: has token / slot -->
  <rect x="205" y="334" width="370" height="185" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- dashed slot label -->
  <text x="320" y="354" text-anchor="middle" fill="#15803d" font-size="10" font-weight="600">🔓 слот: контент расчётного листка</text>

  <!-- Dataset widget inside slot -->
  <rect x="225" y="364" width="330" height="50" rx="6" fill="white" stroke="#a3e635" stroke-width="1"/>
  <text x="390" y="382" text-anchor="middle" fill="#365314" font-size="10" font-weight="700">Датасет расчётного листка</text>
  <text x="390" y="397" text-anchor="middle" fill="#4d7c0f" font-size="9">Authorization: Bearer &lt;токен 2&gt; → backend</text>

  <!-- Any widget inside slot -->
  <rect x="225" y="425" width="330" height="80" rx="6" fill="white" stroke="#a3e635" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="390" y="453" text-anchor="middle" fill="#64748b" font-size="11">📋 Виджеты расчётного листка</text>
  <text x="390" y="471" text-anchor="middle" fill="#94a3b8" font-size="9">(видны только при валидном токене 2)</text>
  <text x="390" y="487" text-anchor="middle" fill="#94a3b8" font-size="9">любые ElemTable, ElemText и др.</text>

  <!-- ═══════════ KEYCLOAK ═══════════ -->
  <rect x="640" y="40" width="230" height="540" rx="14" fill="white" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
  <rect x="640" y="40" width="230" height="36" rx="14" fill="#0f172a"/>
  <rect x="640" y="62" width="230" height="14" rx="0" fill="#0f172a"/>
  <text x="755" y="63" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" letter-spacing="1">KEYCLOAK</text>

  <!-- Client 1 -->
  <rect x="660" y="100" width="190" height="110" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="755" y="120" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700">Client 1</text>
  <text x="755" y="136" text-anchor="middle" fill="#475569" font-size="10">Основное приложение</text>
  <rect x="672" y="145" width="166" height="18" rx="4" fill="#dbeafe"/>
  <text x="755" y="158" text-anchor="middle" fill="#1e40af" font-size="9">доменная / логин-пароль</text>
  <rect x="672" y="168" width="166" height="18" rx="4" fill="#dbeafe"/>
  <text x="755" y="181" text-anchor="middle" fill="#1e40af" font-size="9">implicit / auth code flow</text>

  <!-- Client 2 -->
  <rect x="660" y="240" width="190" height="140" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="755" y="260" text-anchor="middle" fill="#92400e" font-size="11" font-weight="700">Client 2</text>
  <text x="755" y="276" text-anchor="middle" fill="#475569" font-size="10">Расчётный листок</text>
  <rect x="672" y="284" width="166" height="18" rx="4" fill="#fef3c7"/>
  <text x="755" y="297" text-anchor="middle" fill="#92400e" font-size="9">standard flow + PKCE</text>
  <rect x="672" y="306" width="166" height="18" rx="4" fill="#fef3c7"/>
  <text x="755" y="319" text-anchor="middle" fill="#92400e" font-size="9">2FA обязателен для всех</text>
  <rect x="672" y="328" width="166" height="18" rx="4" fill="#fef3c7"/>
  <text x="755" y="341" text-anchor="middle" fill="#92400e" font-size="9">без client_secret на фронте</text>
  <rect x="672" y="350" width="166" height="18" rx="4" fill="#fef3c7"/>
  <text x="755" y="363" text-anchor="middle" fill="#92400e" font-size="9">popup → postMessage</text>

  <!-- Popup box -->
  <rect x="660" y="420" width="190" height="100" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5 3" filter="url(#shadow)"/>
  <text x="755" y="442" text-anchor="middle" fill="#7e22ce" font-size="11" font-weight="700">Popup window</text>
  <text x="755" y="458" text-anchor="middle" fill="#6b21a8" font-size="9">Keycloak 2FA форма</text>
  <text x="755" y="473" text-anchor="middle" fill="#6b21a8" font-size="9">после успеха:</text>
  <text x="755" y="487" text-anchor="middle" fill="#6b21a8" font-size="9">postMessage(токен 2) → parent</text>
  <text x="755" y="502" text-anchor="middle" fill="#6b21a8" font-size="9">window.close()</text>

  <!-- ═══════════ ARROWS ═══════════ -->

  <!-- User → AuthContainer: 1. открыл приложение -->
  <line x1="108" y1="270" x2="160" y2="126" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="68" y="200" width="88" height="24" rx="4" fill="#eff6ff"/>
  <text x="112" y="216" text-anchor="middle" fill="#1d4ed8" font-size="9">1. открыл приложение</text>

  <!-- AuthContainer → KC Client1: 2. redirect auth -->
  <line x1="365" y1="126" x2="658" y2="145" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="510" y="122" text-anchor="middle" fill="#1d4ed8" font-size="9">2. redirect → auth</text>

  <!-- KC Client1 → AuthContainer: 3. токен 1 -->
  <line x1="658" y1="165" x2="365" y2="148" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="510" y="175" text-anchor="middle" fill="#15803d" font-size="9">3. токен 1 ✓</text>

  <!-- User → SecondFactor button: 4. нажал кнопку -->
  <line x1="108" y1="285" x2="218" y2="292" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="63" y="310" text-anchor="middle" fill="#92400e" font-size="9">4. нажал</text>
  <text x="63" y="322" text-anchor="middle" fill="#92400e" font-size="9">кнопку</text>

  <!-- SecondFactorContainer → KC Client2: 5. popup + PKCE -->
  <line x1="557" y1="285" x2="658" y2="300" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="605" y="282" text-anchor="middle" fill="#92400e" font-size="9">5. popup</text>
  <text x="605" y="295" text-anchor="middle" fill="#92400e" font-size="9">+ PKCE</text>

  <!-- KC Client2 → Popup -->
  <line x1="755" y1="380" x2="755" y2="418" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="770" y="405" fill="#7e22ce" font-size="9">2FA форма</text>

  <!-- Popup → SecondFactorContainer: 6. postMessage токен 2 -->
  <line x1="658" y1="465" x2="557" y2="365" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="620" y="430" text-anchor="middle" fill="#15803d" font-size="9">6. postMessage</text>
  <text x="620" y="442" text-anchor="middle" fill="#15803d" font-size="9">(токен 2)</text>

  <!-- sessionStorage arrow -->
  <line x1="430" y1="295" x2="485" y2="268" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr-orange)"/>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="140" y="592" width="620" height="22" rx="6" fill="#f1f5f9"/>
  <line x1="155" y1="603" x2="185" y2="603" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="190" y="607" fill="#475569" font-size="9">основная авторизация</text>
  <line x1="305" y1="603" x2="335" y2="603" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="340" y="607" fill="#475569" font-size="9">второй фактор (PKCE)</text>
  <line x1="460" y1="603" x2="490" y2="603" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="495" y="607" fill="#475569" font-size="9">токен получен / доступ открыт</text>
</svg>
